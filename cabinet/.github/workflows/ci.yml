name: CI Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test-rust:
    name: Rust Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable

      - name: Run tests
        run: cargo test --workspace

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Check formatting
        run: cargo fmt -- --check

  test-python:
    name: Python Binding Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-action@stable
        with:
          toolchain: stable

      - name: Install maturin
        run: pip install maturin

      - name: Build & install pycabinet
        run: maturin develop
        working-directory: ./pycabinet

      - name: Run Python tests
        run: python -c "import pycabinet; m = pycabinet.Memory('./test.db'); m.insert('test'); print('OK')"
